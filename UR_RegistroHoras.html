// ─── GRAPH API HELPERS ────────────────────────────────────────────────────────
async function getToken(){
  if(!currentUser)throw new Error("No hay sesión activa");
  try{const r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account:currentUser});return r.accessToken;}
  catch(e){await msalInstance.acquireTokenRedirect({scopes:SCOPES,account:currentUser});throw new Error("Redirigiendo...");}
}
async function gFetch(token,url){
  const r=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`Graph error ${r.status}: ${e.error?.message||url}`)}
  return r.json();
}

// ─── LECTURA DE EMAILS ENVIADOS HOY ──────────────────────────────────────────
async function leerEmailsHoy(token){
  const hoy = new Date();
  const inicio = new Date(hoy); inicio.setHours(0,0,0,0);
  const fin = new Date(hoy); fin.setHours(23,59,59,999);
  const isoI = inicio.toISOString(); const isoF = fin.toISOString();
  // Leer carpeta Elementos enviados paginando hasta 100 emails
  let emails = []; let url =
    `https://graph.microsoft.com/v1.0/me/mailFolders/SentItems/messages?$top=100`+
    `&$filter=sentDateTime ge ${isoI} and sentDateTime le ${isoF}`+
    `&$select=id,subject,sentDateTime,toRecipients,ccRecipients,bodyPreview,hasAttachments,body`+
    `&$orderby=sentDateTime asc`;
  while(url){
    const d = await gFetch(token, url);
    emails = emails.concat(d.value||[]);
    url = d['@odata.nextLink']||null;
  }
  return emails;
}

  const fin = new Date(hoy); fin.setHours(23,59,59,999);
  const url =
    `https://graph.microsoft.com/v1.0/me/calendarView?`+
    `startDateTime=${inicio.toISOString()}&endDateTime=${fin.toISOString()}`+
    `&$select=subject,start,end,showAs,isAllDay,isCancelled,attendees,organizer`+
    `&$top=50`;
  const d = await gFetch(token, url);
  return (d.value||[]).filter(e=>!e.isCancelled && e.showAs!=='free' && !e.isAllDay);
}

// ─── LÓGICA DE ASIGNACIÓN DE CLIENTE ─────────────────────────────────────────
function clienteDesdeRecipientes(toList, ccList, asunto){

  // PROSOCAM en asunto
  if(asunto.toLowerCase().includes("prosocam")) return "PROSOCAM";
  // jsl@lexvel.com sin Furia Homes → KP
  const todos = [...toList,...ccList];
  // Buscar por email exacto
  for(const e of todos){
    const em = (e.emailAddress?.address||"").toLowerCase();
    if(DOMINIOS_INTERNOS.has(em.split("@")[1])) continue;
    if(EMAIL_CLIENTE[em]) return EMAIL_CLIENTE[em];
  }
  // Buscar por dominio
  for(const e of todos){
    const em = (e.emailAddress?.address||"").toLowerCase();
    const dom = em.split("@")[1]||"";
    if(DOMINIOS_INTERNOS.has(dom)) continue;
    if(DOMINIO_CLIENTE[dom]) return DOMINIO_CLIENTE[dom];
  }
  // Solo internos → Interno
  const externoCount = todos.filter(e=>{
    const dom=(e.emailAddress?.address||"").toLowerCase().split("@")[1]||"";
    return !DOMINIOS_INTERNOS.has(dom);
  }).length;
  if(externoCount===0) return "Interno";
  return "— pendiente —";
}

// ─── ESTIMACIÓN DE TIEMPO ────────────────────────────────────────────────────
function estimarMinutos(emails){
  // emails: array de emails del mismo hilo
  let score = 0;
  for(const em of emails){
    const body = (em.body?.content||em.bodyPreview||"");
    const words = body.replace(/<[^>]+>/g,"").split(/\s+/).filter(w=>w.length>3).length;
    // Señales de tiempo alto
    if(em.hasAttachments) score += 2;
    if(words > 400) score += 4;
    else if(words > 150) score += 2;
    else if(words > 50) score += 1;
    // Referencias normativas
    const normas = (body.match(/art[íi]culo|apartado|\bLIVA\b|\bLIS\b|\bLIRPF\b|\bLIP\b|\bTEAF\b|\bTEAC\b|\bREBU\b|\bCDI\b|\bSPA\b|epígrafe|jurisprudencia|sentencia/gi)||[]).length;
    score += Math.min(normas, 4);
  }
  if(score >= 10) return 90;
  if(score >= 6)  return 60;
  if(score >= 3)  return 30;
  if(score >= 1)  return 15;
  return 5;
}

// ─── DETERMINAR TAREA ────────────────────────────────────────────────────────
function determinarTarea(emails, esReunion){
  if(esReunion) return TAREAS[2];
  const body = emails.map(e=>e.body?.content||e.bodyPreview||"").join(" ").replace(/<[^>]+>/g,"").toLowerCase();
  const words = body.split(/\s+/).filter(w=>w.length>3).length;
  const tieneAdjunto = emails.some(e=>e.hasAttachments);
  if(words>200 && (body.includes("artículo")||body.includes("análisis")||body.includes("tributar")||body.includes("impuesto"))) return TAREAS[0];
  if(tieneAdjunto && words>100) return TAREAS[1];
  if(words>50) return TAREAS[0];
  return TAREAS[3];
}

// ─── NORMALIZAR ASUNTO (quitar prefijos) ─────────────────────────────────────
function normAsunto(s){
  return (s||"").replace(/^(RE|RV|FW|R|FWD):\s*/gi,"").trim().toLowerCase();
}

// ─── AGRUPAR EMAILS POR HILO ─────────────────────────────────────────────────
function agruparEmails(emails){
  const hilos = new Map(); // normAsunto → [emails]
  for(const em of emails){
    const key = normAsunto(em.subject);
    if(!hilos.has(key)) hilos.set(key,[]);
    hilos.get(key).push(em);
  }
  return hilos;
}

// ─── ASIGNAR BLOQUE SEGÚN CLIENTE ────────────────────────────────────────────
function bloqueParaCliente(cliente){
  if(cliente==="Interno") return "b3";
  if(cliente==="— pendiente —") return "b3";
  if(IGUALAS.has(cliente)) return "b2";
  return "b1";
}

// ─── INGESTIÓN COMPLETA ───────────────────────────────────────────────────────
async function ingestarDatos(token){
  setLoading("Leyendo emails enviados hoy...");
  const emails = await leerEmailsHoy(token);

  setLoading("Leyendo calendario...");
  const eventos = await leerCalendarioHoy(token);

  // Reiniciar bloques
  data.forEach(b=>b.rows=[]);

  // ── Procesar emails ──
  const hilos = agruparEmails(emails);
  let idx = 0;
  for(const [asunto, grupo] of hilos){
    const asuntoOriginal = grupo[0].subject||"";
    const toList = grupo.flatMap(e=>e.toRecipients||[]);
    const ccList = grupo.flatMap(e=>e.ccRecipients||[]);
    const cliente = clienteDesdeRecipientes(toList, ccList, asuntoOriginal);
    if(cliente==="__EXCLUIR__") continue;
    if(EXCLUIR_CLIENTES.has(cliente)) continue;
    const minutos = estimarMinutos(grupo);
    const tarea = determinarTarea(grupo, false);
    const bid = bloqueParaCliente(cliente);
    const n = grupo.length;
    const desc = `${asuntoOriginal.replace(/^(RE|RV|FW|R|FWD):\s*/gi,"")} (${n} email${n>1?"s":""})`;
    data.find(b=>b.bid===bid).rows.push({
      id:`e${idx++}`,c:cliente,t:tarea,m:minutos,d:desc,p:cliente==="— pendiente —"
    });
  }

  // ── Procesar eventos de calendario ──
  for(const ev of eventos){
    const asunto = ev.subject||"";
    // Intentar detectar cliente por asistentes
    const asistentes = (ev.attendees||[]).map(a=>a.emailAddress||{});
    const cliente = clienteDesdeRecipientes(asistentes, [], asunto);
    if(cliente==="__EXCLUIR__") continue;
    const start = new Date(ev.start.dateTime||ev.start);
    const end = new Date(ev.end.dateTime||ev.end);
    const durMin = Math.round((end-start)/60000);
    const bid = bloqueParaCliente(cliente);
    const hora = start.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
    const desc = `${asunto} — reunión ${hora} (${Math.floor(durMin/60)}h${durMin%60>0?" "+durMin%60+"min":""})`;
    data.find(b=>b.bid===bid).rows.push({
      id:`ev${idx++}`,c:cliente,t:TAREAS[2],m:durMin,d:desc,p:cliente==="— pendiente —"
    });
  }
}

// ─── UTILIDADES DE UI ─────────────────────────────────────────────────────────
function setLoading(txt, step=""){
  document.getElementById("loading-text").textContent=txt;
  document.getElementById("loading-steps").textContent=step;
}

function esLaborable(d){return d.getDay()>=1&&d.getDay()<=5;}
function diasPendientes(reg){
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const s=new Set(reg);const lista=[];
  for(let i=1;i<=30;i++){
    const d=new Date(hoy);d.setDate(hoy.getDate()-i);
    if(!esLaborable(d))continue;
    const k=d.toISOString().split("T")[0];
    if(s.has(k))break;
    lista.push(d);if(lista.length>=10)break;
  }
  return lista.reverse();
}
function mostrarPendientes(dias){
  const sec=document.getElementById("pending-days-section");
  if(!dias||dias.length===0){sec.innerHTML="";return;}
  const MM=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const chips=dias.map(d=>`<span class="day-chip">${d.getDate()} ${MM[d.getMonth()]}</span>`).join("");
  const msg=dias.length>=3?`<strong>Atención:</strong> llevas <strong>${dias.length} días laborables sin registrar</strong> horas.`:`Tienes <strong>${dias.length} día${dias.length>1?"s":""} laborable${dias.length>1?"s":""}</strong> sin registrar.`;
  sec.innerHTML=`<div class="pending-days"><h3>Días pendientes</h3><p>${msg}</p><div class="days-list">${chips}</div></div>`;
}

// ─── LOGIN Y ARRANQUE ─────────────────────────────────────────────────────────
async function iniciarSesion(){
  const btn=document.getElementById("btn-login");
  const err=document.getElementById("login-error");
  btn.disabled=true;btn.textContent="Conectando...";err.style.display="none";
  try{
    await msalInstance.initialize();
    const resp=await msalInstance.loginRedirect({scopes:SCOPES});
    currentUser=resp.account;
    const email=currentUser.username.toLowerCase();
    const nombre=EMAILS_ABOGADOS[email]||currentUser.name||currentUser.username;
    currentUser.nombreDespacho=nombre;
    document.getElementById("topbar-user").textContent=nombre;
    document.getElementById("login-screen").style.display="none";
    document.getElementById("loading-screen").style.display="flex";

    const token=await getToken();

    setLoading("Comprobando días registrados...");
    const fechas=await leerFechasRegistradas(token,nombre);
    const pendientes=diasPendientes(fechas);

    await ingestarDatos(token);

    setLoading("Listo");
    document.getElementById("loading-screen").style.display="none";
    document.getElementById("app-screen").style.display="block";

    const hoy=new Date();
    const DD=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    const MM2=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    document.getElementById("day-header").innerHTML=
      `<strong>${DD[hoy.getDay()]}, ${hoy.getDate()} de ${MM2[hoy.getMonth()]} de ${hoy.getFullYear()}</strong>`+
      ` · ${nombre} · ${getTarifa(null,nombre)} €/h`;

    mostrarPendientes(pendientes);

    const total = data.flatMap(b=>b.rows).length;
    if(total===0){
      document.getElementById("top-alerts").innerHTML=
        `<div class="alert-info">No se han encontrado emails enviados ni eventos de calendario para hoy. Puedes añadir filas manualmente.</div>`;
    }
    render();

  }catch(e){
    btn.disabled=false;btn.textContent="Iniciar sesión con Microsoft";
    err.style.display="block";err.textContent="Error: "+e.message;
    document.getElementById("loading-screen").style.display="none";
    document.getElementById("login-screen").style.display="flex";
  }
}

// ─── RENDER Y TABLA ───────────────────────────────────────────────────────────
function getTarifa(c,a){
  const ab=a||(currentUser?currentUser.nombreDespacho:"");
  if(c&&SPECIAL[c])return SPECIAL[c];
  return TARIFAS[ab]||450;
}
function cOpts(sel){return CLIENTES.map(c=>`<option value="${c}"${sel===c?" selected":""}>${c}</option>`).join("")}
function tOpts(sel){return TAREAS.map(t=>`<option value="${t}"${sel===t?" selected":""}>${t}</option>`).join("")}
function rowsHtml(bid,rows){
  return rows.map(r=>{
    const pc=r.p?"pending":"";const badge=r.p?`<span class="badge-p">pendiente</span>`:"";
    return `<tr class="row-main ${pc}" id="rm-${r.id}">
      <td><select onchange="onC('${bid}','${r.id}',this.value)">${cOpts(r.c)}</select>${badge}</td>
      <td><select onchange="refresh()">${tOpts(r.t)}</select></td>
      <td><input type="number" min="0" max="600" value="${r.m}" oninput="refresh()"></td>
      <td></td>
      <td><button class="del-btn" onclick="delRow('${bid}','${r.id}')">×</button></td>
    </tr>
    <tr class="row-desc ${pc}" id="rd-${r.id}">
      <td colspan="4" style="padding:0 8px 6px"><textarea class="desc-input" rows="2">${r.d}</textarea></td>
      <td></td>
    </tr>`;
  }).join("");
}
function blockHtml(b){
  return `<div class="block">
    <div class="block-header">
      <span class="block-title" style="color:${b.color}">${b.label}</span>
      <span class="block-mins" id="bm-${b.bid}"></span>
    </div>
    <table><colgroup><col class="tc"><col class="tt"><col class="tm"><col class="td"><col class="tx"></colgroup>
    <thead><tr><th>Cliente</th><th>Tarea</th><th style="text-align:center">Min</th><th>Descripción</th><th></th></tr></thead>
    <tbody id="tb-${b.bid}">${rowsHtml(b.bid,b.rows)}</tbody></table>
    <button class="add-btn" onclick="addRow('${b.bid}')">+ Añadir fila</button>
  </div>`;
}
function render(){
  document.getElementById("blocks").innerHTML=data.map(blockHtml).join("");
  const p=data.flatMap(b=>b.rows).filter(r=>r.p).length;
  document.getElementById("top-alerts").innerHTML=p>0
    ?`<div class="alert">${p} entrada${p>1?"s":""} marcadas como <strong>— pendiente —</strong> requieren asignación de cliente.</div>`
    :"";
  refresh();
}
function getMins(bid){
  const tb=document.getElementById("tb-"+bid);
  if(!tb)return 0;
  return Array.from(tb.querySelectorAll("input[type=number]")).reduce((s,i)=>s+(parseInt(i.value)||0),0);
}
function refresh(){
  data.forEach(b=>{
    const m=getMins(b.bid);
    const el=document.getElementById("bm-"+b.bid);
    if(el)el.innerHTML=`<b>${Math.floor(m/60)}h ${m%60}min</b>`;
  });
  const map={};
  data.forEach(b=>{
    const tb=document.getElementById("tb-"+b.bid);
    if(!tb)return;
    Array.from(tb.querySelectorAll("tr.row-main")).forEach(tr=>{
      const c=tr.querySelector("select").value;
      const m=parseInt(tr.querySelector("input[type=number]").value)||0;
      map[c]=(map[c]||0)+m;
    });
  });
  const total=Object.values(map).reduce((s,v)=>s+v,0);
  let html=Object.entries(map).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])
    .map(([c,m])=>`<div class="sum-row"><span>${c}</span><span>${Math.floor(m/60)}h ${m%60}min</span></div>`).join("");
  html+=`<div class="sum-row"><span>Total</span><span>${Math.floor(total/60)}h ${total%60}min</span></div>`;
  document.getElementById("sum-rows").innerHTML=html;
}
function onC(bid,rid,val){
  const b=data.find(x=>x.bid===bid);if(!b)return;
  const r=b.rows.find(x=>x.id===rid);if(!r)return;
  r.p=(val==="— pendiente —");
  ["rm-","rd-"].forEach(p=>{
    const el=document.getElementById(p+rid);
    if(!el)return;
    el.className=el.className.replace(/\bpending\b/g,"").trim()+(r.p?" pending":"");
  });
  const badge=document.getElementById("rm-"+rid)?.querySelector(".badge-p");
  if(badge)badge.style.display=r.p?"":"none";
  const pendTotal=data.flatMap(b=>b.rows).filter(r=>r.p).length;
  document.getElementById("top-alerts").innerHTML=pendTotal>0
    ?`<div class="alert">${pendTotal} entrada${pendTotal>1?"s":""} marcadas como <strong>— pendiente —</strong> requieren asignación de cliente.</div>`:"";
  refresh();
}
function delRow(bid,rid){
  const b=data.find(x=>x.bid===bid);if(!b)return;
  b.rows=b.rows.filter(x=>x.id!==rid);
  ["rm-","rd-"].forEach(p=>{const el=document.getElementById(p+rid);if(el)el.remove();});
  refresh();
}
function addRow(bid){
  const b=data.find(x=>x.bid===bid);if(!b)return;
  const id="e"+rc++;
  const nr={id,c:"— pendiente —",t:TAREAS[3],m:0,d:"",p:true};
  b.rows.push(nr);
  const tb=document.getElementById("tb-"+bid);
  const tmp=document.createElement("tbody");
  tmp.innerHTML=rowsHtml(bid,[nr]);
  Array.from(tmp.children).forEach(tr=>tb.appendChild(tr));
  refresh();
}
function getRows(){
  const rows=[];
  data.forEach(b=>{
    const tb=document.getElementById("tb-"+b.bid);
    if(!tb)return;
    Array.from(tb.querySelectorAll("tr.row-main")).forEach(tr=>{
      const sels=tr.querySelectorAll("select");
      const inp=tr.querySelector("input[type=number]");
      const rdesc=tr.nextElementSibling;
      const desc=rdesc?rdesc.querySelector("textarea")?.value||"":"";
      rows.push({cliente:sels[0].value,tarea:sels[1].value,minutos:parseInt(inp.value)||0,descripcion:desc});
    });
  });
  return rows;
}

// ─── RESUMEN Y GUARDADO ───────────────────────────────────────────────────────
function abrirResumen(){
  const rows=getRows();
  const sinMin=rows.filter(r=>r.minutos===0);
  const sinC=rows.filter(r=>r.cliente==="— pendiente —"&&r.minutos>0);
  const fact=rows.filter(r=>r.minutos>0&&r.cliente!=="Interno"&&r.cliente!=="— pendiente —"&&!IGUALAS.has(r.cliente));
  const ig=rows.filter(r=>r.minutos>0&&IGUALAS.has(r.cliente));
  const otros=rows.filter(r=>r.minutos>0&&r.cliente==="Interno");
  function grp(arr){const m={};arr.forEach(r=>{m[r.cliente]=(m[r.cliente]||0)+r.minutos;});return m;}
  const fg=grp(fact),ig2=grp(ig),og=grp(otros);
  const ab=currentUser?currentUser.nombreDespacho:"—";
  let ftotal=0;
  let fhtml=Object.entries(fg).map(([c,m])=>{
    const t=getTarifa(c,ab),imp=(m/60)*t;ftotal+=imp;
    return `<tr><td>${c}</td><td style="text-align:right">${Math.floor(m/60)}h ${m%60}min</td><td style="text-align:right;color:#888">${t}€/h</td><td style="text-align:right;font-weight:500">${Math.round(imp).toLocaleString("es-ES")}€</td></tr>`;
  }).join("");
  fhtml+=`<tr class="total-row"><td colspan="3">Total facturable</td><td style="text-align:right">${Math.round(ftotal).toLocaleString("es-ES")}€</td></tr>`;
  const ihtml=Object.entries(ig2).map(([c,m])=>{
    const t=getTarifa(null,ab),imp=(m/60)*t;
    return `<tr><td>${c}</td><td style="text-align:right">${Math.floor(m/60)}h ${m%60}min</td><td style="text-align:right;font-weight:500">${Math.round(imp).toLocaleString("es-ES")}€</td></tr>`;
  }).join("");
  const ohtml=Object.entries(og).map(([c,m])=>`<tr><td>${c}</td><td style="text-align:right">${Math.floor(m/60)}h ${m%60}min</td></tr>`).join("");
  let warns="";
  if(sinMin.length)warns+=`<div class="alert">${sinMin.length} entrada${sinMin.length>1?"s":""} con 0 minutos.</div>`;
  if(sinC.length)warns+=`<div class="alert">${sinC.length} entrada${sinC.length>1?"s":""} sin cliente asignado.</div>`;
  document.getElementById("modal").innerHTML=`
    ${warns}
    <h2>Resumen — ${new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</h2>
    <div class="msec-title">Honorarios facturables</div>
    <table>${fhtml||"<tr><td style='color:#888'>Sin entradas facturables</td></tr>"}</table>
    ${ihtml?`<div class="msec-title">Valor interno igualas</div><table>${ihtml}</table>`:""}
    ${ohtml?`<div class="msec-title">Otros</div><table>${ohtml}</table>`:""}
    <div class="impact">Hoy has generado <strong>${Math.round(ftotal).toLocaleString("es-ES")} €</strong> en honorarios facturables. Cada hora no registrada representa <strong>${getTarifa(null,ab)} €</strong> que el despacho no puede facturar.</div>
    <button class="modal-btn" id="btn-sp" onclick="guardarEnSharePoint()">Guardar en SharePoint</button>
    <button class="modal-btn-sec" onclick="document.getElementById('overlay').style.display='none'">Cerrar sin guardar</button>`;
  document.getElementById("overlay").style.display="flex";
}

async function guardarEnSharePoint(){
  const btn=document.getElementById("btn-sp");
  btn.disabled=true;btn.innerHTML=`<span class="spinner"></span>Guardando...`;
  try{
    const token=await getToken();
    const item=await gFetch(token,`https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/root:/${XLSX_PATH}`);
    const itemId=item.id;
    const rows=getRows().filter(r=>r.minutos>0&&r.cliente!=="— pendiente —");
    const fecha=new Date().toISOString().split("T")[0];
    const ab=currentUser.nombreDespacho;
    let ok=0,fail=0;
    for(const r of rows){
      const t=getTarifa(r.cliente,ab);
      const imp=Math.round((r.minutos/60)*t*100)/100;
      const ig=IGUALAS.has(r.cliente)?"Sí":"No";
      const body={values:[[fecha,ab,r.cliente,r.tarea,r.descripcion,r.minutos,t,imp,ig]]};
      const resp=await fetch(
        `https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${itemId}/workbook/tables/${TABLE_NAME}/rows`,
        {method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body)}
      );
      if(resp.ok)ok++;else{fail++;console.error(await resp.json());}
    }
    if(fail===0){
      document.getElementById("modal").innerHTML=
        `<div class="alert-success"><strong>${ok} fila${ok>1?"s":""} guardada${ok>1?"s":""} correctamente en SharePoint.</strong><br>
        <span style="font-size:11px;margin-top:4px;display:block">Registradas en UR_Registro_Horas_v2_2.xlsx</span></div>
        <button class="modal-btn-sec" onclick="cerrarYBloquear()">Cerrar</button>`;
    }else{
      document.getElementById("modal").innerHTML=
        `<div class="alert-danger">${ok} filas guardadas, ${fail} con error. Abre la consola (F12) para detalles.</div>
        <button class="modal-btn-sec" onclick="document.getElementById('overlay').style.display='none'">Cerrar</button>`;
    }
  }catch(e){
    btn.disabled=false;btn.innerHTML="Guardar en SharePoint";
    document.getElementById("modal").insertAdjacentHTML("afterbegin",
      `<div class="alert-danger" style="margin-bottom:8px">Error: ${e.message}</div>`);
  }
}

function cerrarYBloquear(){
  document.getElementById("overlay").style.display="none";
  const cb=document.getElementById("btn-confirm");
  cb.disabled=true;cb.textContent="Horas confirmadas y guardadas ✓";
}
