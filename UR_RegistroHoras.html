let rc=50;
const HOY = new Date().toISOString().split("T")[0];

function esLaborable(d){return d.getDay()>=1&&d.getDay()<=5;}
function diasPendientes(reg){
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const s=new Set(reg);const lista=[];
  for(let i=1;i<=30;i++){
    const d=new Date(hoy);d.setDate(hoy.getDate()-i);
    if(!esLaborable(d))continue;
    const k=d.toISOString().split("T")[0];
    if(s.has(k))break;
    lista.push(d);if(lista.length>=10)break;
  }
  return lista.reverse();
}
async function getToken(){
  if(!currentUser)throw new Error("No hay sesión activa");
  try{const r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account:currentUser});return r.accessToken;}
  catch(e){const r=await msalInstance.acquireTokenPopup({scopes:SCOPES,account:currentUser});return r.accessToken;}
}
async function leerFechas(token,nombre){
  try{
    const r1=await fetch(`https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/root:/Documentos%20compartidos/Gesti%C3%B3n%20del%20conocimiento/Claude%20Time%20Report/UR_Registro_Horas_v2_2.xlsx`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r1.ok)return[];
    const item=await r1.json();
    const r2=await fetch(`https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${item.id}/workbook/tables/${TABLE_NAME}/rows`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r2.ok)return[];
    const d2=await r2.json();
    const fechas=new Set();
    for(const row of d2.value||[]){
      const v=row.values[0];
      if((v[1]||"").toString().toLowerCase().includes(nombre.split(" ")[0].toLowerCase())){
        const f=(v[0]||"").toString().substring(0,10);if(f)fechas.add(f);
      }
    }
    return[...fechas];
  }catch(e){return[];}
}
function mostrarPendientes(dias){
  const sec=document.getElementById("pending-days-section");
  if(!dias||dias.length===0){sec.innerHTML="";return;}
  const MM=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const chips=dias.map(d=>`<span class="day-chip">${d.getDate()} ${MM[d.getMonth()]}</span>`).join("");
  const msg=dias.length>=3?`<strong>Atención:</strong> llevas <strong>${dias.length} días laborables sin registrar</strong> horas.`:`Tienes <strong>${dias.length} día${dias.length>1?"s":""} laborable${dias.length>1?"s":""}</strong> sin registrar.`;
  sec.innerHTML=`<div class="pending-days"><h3>Días pendientes</h3><p>${msg}</p><div class="days-list">${chips}</div></div>`;
}
async function iniciarSesion(){
  const btn=document.getElementById("btn-login");
  const err=document.getElementById("login-error");
  btn.disabled=true;btn.textContent="Conectando...";err.style.display="none";
  try{
    await msalInstance.initialize();
    const resp=await msalInstance.loginPopup({scopes:SCOPES});
    currentUser=resp.account;
    const email=currentUser.username.toLowerCase();
    const nombre=EMAILS_ABOGADOS[email]||currentUser.name||currentUser.username;
    currentUser.nombreDespacho=nombre;
    document.getElementById("topbar-user").textContent=nombre;
    document.getElementById("login-screen").style.display="none";
    document.getElementById("loading-screen").style.display="flex";
    const token=await getToken();
    const fechas=await leerFechas(token,nombre);
    const pendientes=diasPendientes(fechas);
    document.getElementById("loading-screen").style.display="none";
    document.getElementById("app-screen").style.display="block";
    const hoy=new Date();
    const DD=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    const MM2=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    document.getElementById("day-header").innerHTML=`<strong>${DD[hoy.getDay()]}, ${hoy.getDate()} de ${MM2[hoy.getMonth()]} de ${hoy.getFullYear()}</strong> · ${nombre} · ${getTarifa(null,nombre)} €/h`;
    mostrarPendientes(pendientes);
    render();
  }catch(e){
    btn.disabled=false;btn.textContent="Iniciar sesión con Microsoft";
    err.style.display="block";err.textContent="Error: "+e.message;
  }
}
function getTarifa(c,a){const ab=a||(currentUser?currentUser.nombreDespacho:"");if(c&&SPECIAL[c])return SPECIAL[c];return TARIFAS[ab]||450;}

// ── DESPLEGABLE DE CLIENTES con grupos de prioridad ───────────────────────────
function cOpts(sel){
  const prio = CLIENTES_DEF.filter(x=>x.g==="P");
  const alfa = CLIENTES_DEF.filter(x=>x.g==="A").sort((a,b)=>a.n.localeCompare(b.n,"es"));
  const resi = CLIENTES_DEF.filter(x=>x.g==="R").sort((a,b)=>a.n.localeCompare(b.n,"es"));
  const extra = clientesExtra.map(n=>({n,g:"X"}));

  let html = "";
  // Grupo Prioritarios
  html += `<optgroup label="── Prioritarios ──">`;
  prio.forEach(c=>{ html+=`<option value="${c.n}"${sel===c.n?" selected":""}>${c.n}</option>`; });
  html += `</optgroup>`;
  // Grupo Alfabéticos
  html += `<optgroup label="── Alfabéticos ──">`;
  alfa.forEach(c=>{ html+=`<option value="${c.n}"${sel===c.n?" selected":""}>${c.n}</option>`; });
  html += `</optgroup>`;
  // Grupo Residuales
  html += `<optgroup label="── Residuales ──">`;
  resi.forEach(c=>{ html+=`<option value="${c.n}"${sel===c.n?" selected":""}>${c.n}</option>`; });
  html += `</optgroup>`;
  // Clientes añadidos en sesión
  if(extra.length){
    html += `<optgroup label="── Añadidos esta sesión ──">`;
    extra.forEach(c=>{ html+=`<option value="${c.n}"${sel===c.n?" selected":""}>${c.n}</option>`; });
    html += `</optgroup>`;
  }
  // Opción especial para añadir nuevo
  html += `<option value="__nuevo__">+ Añadir cliente nuevo...</option>`;
  return html;
}

function tOpts(sel){return TAREAS.map(t=>`<option value="${t}"${sel===t?" selected":""}>${t}</option>`).join("")}

function rowsHtml(bid,rows){

    const badge=r.p?`<span class="badge-p">pendiente</span>`:"";
    const fecha=r.f||HOY;
    return `<tr class="row-main ${pc}" id="rm-${r.id}">
      <td><input type="date" value="${fecha}" onchange="refresh()" class="date-input-${r.id}"></td>
      <td><select onchange="onC('${bid}','${r.id}',this.value)">${cOpts(r.c)}</select>${badge}<div id="nc-${r.id}" style="display:none" class="new-client-wrap"><input class="new-client-input" placeholder="Nombre del cliente..." id="nci-${r.id}"><button class="new-client-btn" onclick="confirmarNuevoCliente('${bid}','${r.id}')">OK</button></div></td>
      <td><select onchange="refresh()">${tOpts(r.t)}</select></td>
      <td><input type="number" min="0" max="600" value="${r.m}" oninput="refresh()"></td>
      <td></td>
      <td><button class="del-btn" onclick="delRow('${bid}','${r.id}')">×</button></td>
    </tr>
    <tr class="row-desc ${pc}" id="rd-${r.id}"><td colspan="5" style="padding:0 8px 6px"><textarea class="desc-input" rows="2">${r.d}</textarea></td><td></td></tr>`;
  }).join("");
}

function blockHtml(b){
  return `<div class="block"><div class="block-header"><span class="block-title" style="color:${b.color}">${b.label}</span><span class="block-mins" id="bm-${b.bid}"></span></div>
  <table><colgroup><col class="cf"><col class="tc"><col class="tt"><col class="tm"><col class="td"><col class="tx"></colgroup>
  <thead><tr><th>Fecha</th><th>Cliente</th><th>Tarea</th><th style="text-align:center">Min</th><th>Descripción</th><th></th></tr></thead>
  <tbody id="tb-${b.bid}">${rowsHtml(b.bid,b.rows)}</tbody></table>
  <button class="add-btn" onclick="addRow('${b.bid}')">+ Añadir fila</button></div>`;
}

function render(){
  document.getElementById("blocks").innerHTML=data.map(blockHtml).join("");
  const p=data.flatMap(b=>b.rows).filter(r=>r.p).length;
  document.getElementById("top-alerts").innerHTML=p>0?`<div class="alert">${p} entrada${p>1?"s":""} marcadas como <strong>— pendiente —</strong> requieren asignación de cliente.</div>`:"";
  refresh();
}

function getMins(bid){const tb=document.getElementById("tb-"+bid);if(!tb)return 0;return Array.from(tb.querySelectorAll("input[type=number]")).reduce((s,i)=>s+(parseInt(i.value)||0),0);}

function refresh(){
  data.forEach(b=>{const m=getMins(b.bid);const el=document.getElementById("bm-"+b.bid);if(el)el.innerHTML=`<b>${Math.floor(m/60)}h ${m%60}min</b>`;});
  const map={};
  data.forEach(b=>{const tb=document.getElementById("tb-"+b.bid);if(!tb)return;
    Array.from(tb.querySelectorAll("tr.row-main")).forEach(tr=>{
      const sels=tr.querySelectorAll("select");const inp=tr.querySelector("input[type=number]");
      const c=sels[0].value;const m=parseInt(inp.value)||0;
      map[c]=(map[c]||0)+m;
    });
  });
  const total=Object.values(map).reduce((s,v)=>s+v,0);
  let html=Object.entries(map).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([c,m])=>`<div class="sum-row"><span>${c}</span><span>${Math.floor(m/60)}h ${m%60}min</span></div>`).join("");
  html+=`<div class="sum-row"><span>Total</span><span>${Math.floor(total/60)}h ${total%60}min</span></div>`;
  document.getElementById("sum-rows").innerHTML=html;
}

function onC(bid,rid,val){
  const b=data.find(x=>x.bid===bid);if(!b)return;
  const r=b.rows.find(x=>x.id===rid);if(!r)return;
  if(val==="__nuevo__"){
    // Mostrar campo inline para introducir nombre
    const nc=document.getElementById("nc-"+rid);
    if(nc)nc.style.display="flex";
    return;
  }
  r.p=(val==="— pendiente —");
  ["rm-","rd-"].forEach(p=>{const el=document.getElementById(p+rid);if(!el)return;el.className=el.className.replace(/\bpending\b/g,"").trim()+(r.p?" pending":"");});
  const badge=document.getElementById("rm-"+rid)?.querySelector(".badge-p");if(badge)badge.style.display=r.p?"":"none";
  refresh();
}

function confirmarNuevoCliente(bid,rid){
  const input=document.getElementById("nci-"+rid);
  if(!input)return;
  const nombre=input.value.trim();
  if(!nombre)return;
  // Añadir a la lista de extras de sesión
  if(!clientesExtra.includes(nombre))clientesExtra.push(nombre);
  // Actualizar el select de esta fila
  const tr=document.getElementById("rm-"+rid);
  if(!tr)return;
  const sel=tr.querySelector("select");
  if(sel){sel.innerHTML=cOpts(nombre);sel.value=nombre;}
  // Ocultar campo
  const nc=document.getElementById("nc-"+rid);if(nc)nc.style.display="none";
  // Actualizar estado pending
  const b=data.find(x=>x.bid===bid);
  if(b){const r=b.rows.find(x=>x.id===rid);if(r){r.p=false;r.c=nombre;}}
  ["rm-","rd-"].forEach(p=>{const el=document.getElementById(p+rid);if(!el)return;el.className=el.className.replace(/\bpending\b/g,"").trim();});
  const badge=document.getElementById("rm-"+rid)?.querySelector(".badge-p");if(badge)badge.style.display="none";
  refresh();
}

function delRow(bid,rid){
  const b=data.find(x=>x.bid===bid);if(!b)return;
  b.rows=b.rows.filter(x=>x.id!==rid);
  ["rm-","rd-"].forEach(p=>{const el=document.getElementById(p+rid);if(el)el.remove();});
  refresh();
}

function addRow(bid){
  const b=data.find(x=>x.bid===bid);if(!b)return;
  const id="e"+rc++;
  const nr={id,c:"— pendiente —",t:TAREAS[3],m:0,d:"",p:true,f:new Date().toISOString().split("T")[0]};
  b.rows.push(nr);
  const tb=document.getElementById("tb-"+bid);
  const tmp=document.createElement("tbody");
  tmp.innerHTML=rowsHtml(bid,[nr]);
  Array.from(tmp.children).forEach(tr=>tb.appendChild(tr));
  refresh();
}

function getRows(){
  const rows=[];
  data.forEach(b=>{
    const tb=document.getElementById("tb-"+b.bid);if(!tb)return;
    Array.from(tb.querySelectorAll("tr.row-main")).forEach(tr=>{
      const sels=tr.querySelectorAll("select");
      const inp=tr.querySelector("input[type=number]");
      const dateInp=tr.querySelector("input[type=date]");
      const rdesc=tr.nextElementSibling;
      const desc=rdesc?rdesc.querySelector("textarea")?.value||"":"";
      const fecha=dateInp?dateInp.value:HOY;
      rows.push({fecha,cliente:sels[0].value,tarea:sels[1].value,minutos:parseInt(inp.value)||0,descripcion:desc});
    });
  });
  return rows;
}

function abrirResumen(){
  const rows=getRows();
  const sinMin=rows.filter(r=>r.minutos===0);
  const sinC=rows.filter(r=>r.cliente==="— pendiente —"&&r.minutos>0);
  const fact=rows.filter(r=>r.minutos>0&&r.cliente!=="Interno"&&r.cliente!=="— pendiente —"&&!IGUALAS.has(r.cliente));
  const ig=rows.filter(r=>r.minutos>0&&IGUALAS.has(r.cliente));
  const otros=rows.filter(r=>r.minutos>0&&r.cliente==="Interno");
  function grp(arr){const m={};arr.forEach(r=>{m[r.cliente]=(m[r.cliente]||0)+r.minutos;});return m;}
  const fg=grp(fact),ig2=grp(ig),og=grp(otros);
  const ab=currentUser?currentUser.nombreDespacho:"—";
  let ftotal=0;
  let fhtml=Object.entries(fg).map(([c,m])=>{const t=getTarifa(c,ab),imp=(m/60)*t;ftotal+=imp;return `<tr><td>${c}</td><td style="text-align:right">${Math.floor(m/60)}h ${m%60}min</td><td style="text-align:right;color:#888">${t}€/h</td><td style="text-align:right;font-weight:500">${Math.round(imp).toLocaleString("es-ES")}€</td></tr>`;}).join("");
  fhtml+=`<tr class="total-row"><td colspan="3">Total facturable</td><td style="text-align:right">${Math.round(ftotal).toLocaleString("es-ES")}€</td></tr>`;
  const ihtml=Object.entries(ig2).map(([c,m])=>{const t=getTarifa(null,ab),imp=(m/60)*t;return `<tr><td>${c}</td><td style="text-align:right">${Math.floor(m/60)}h ${m%60}min</td><td style="text-align:right;font-weight:500">${Math.round(imp).toLocaleString("es-ES")}€</td></tr>`;}).join("");
  const ohtml=Object.entries(og).map(([c,m])=>`<tr><td>${c}</td><td style="text-align:right">${Math.floor(m/60)}h ${m%60}min</td></tr>`).join("");
  let warns="";
  if(sinMin.length)warns+=`<div class="alert">${sinMin.length} entrada${sinMin.length>1?"s":""} con 0 minutos.</div>`;
  if(sinC.length)warns+=`<div class="alert">${sinC.length} entrada${sinC.length>1?"s":""} sin cliente asignado.</div>`;
  document.getElementById("modal").innerHTML=`${warns}<h2>Resumen — ${new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</h2>
  <div class="msec-title">Honorarios facturables</div><table>${fhtml||"<tr><td style='color:#888'>Sin entradas facturables</td></tr>"}</table>
  ${ihtml?`<div class="msec-title">Valor interno igualas</div><table>${ihtml}</table>`:""}${ohtml?`<div class="msec-title">Otros</div><table>${ohtml}</table>`:""}
  <div class="impact">Has generado <strong>${Math.round(ftotal).toLocaleString("es-ES")} €</strong> en honorarios facturables. Cada hora no registrada representa <strong>${getTarifa(null,ab)} €</strong> que el despacho no puede facturar.</div>
  <button class="modal-btn" id="btn-sp" onclick="guardarEnSharePoint()">Guardar en SharePoint</button>
  <button class="modal-btn-sec" onclick="document.getElementById('overlay').style.display='none'">Cerrar sin guardar</button>`;
  document.getElementById("overlay").style.display="flex";
}

async function guardarEnSharePoint(){
  const btn=document.getElementById("btn-sp");btn.disabled=true;btn.innerHTML=`<span class="spinner"></span>Guardando...`;
  try{
    const token=await getToken();
    const r1=await fetch(`https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/root:/Documentos%20compartidos/Gesti%C3%B3n%20del%20conocimiento/Claude%20Time%20Report/UR_Registro_Horas_v2_2.xlsx`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r1.ok)throw new Error(`No se pudo acceder al archivo (${r1.status}).`);
    const item=await r1.json();const itemId=item.id;
    // Filtrar filas válidas — usar la fecha REAL de cada fila
    const rows=getRows().filter(r=>r.minutos>0&&r.cliente!=="— pendiente —");
    const ab=currentUser.nombreDespacho;
    let ok=0,fail=0;
    for(const r of rows){
      const t=getTarifa(r.cliente,ab);
      const imp=Math.round((r.minutos/60)*t*100)/100;
      // r.fecha contiene la fecha real de esa fila (YYYY-MM-DD)
      const body={values:[[r.fecha,ab,r.cliente,r.tarea,r.descripcion,r.minutos,t,imp,"No"]]};
      const resp=await fetch(`https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${itemId}/workbook/tables/${TABLE_NAME}/rows`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(resp.ok)ok++;else{fail++;console.error(await resp.json());}
    }
    if(fail===0){
      document.getElementById("modal").innerHTML=`<div class="alert-success"><strong>${ok} fila${ok>1?"s":""} guardada${ok>1?"s":""} correctamente en SharePoint.</strong><br><span style="font-size:11px;margin-top:4px;display:block">Registradas en UR_Registro_Horas_v2_2.xlsx</span></div><button class="modal-btn-sec" onclick="cerrarYBloquear()">Cerrar</button>`;
    }else{
      document.getElementById("modal").innerHTML=`<div class="alert-danger">${ok} filas guardadas, ${fail} con error. Pulsa F12 para detalles.</div><button class="modal-btn-sec" onclick="document.getElementById('overlay').style.display='none'">Cerrar</button>`;
    }
  }catch(e){
    btn.disabled=false;btn.innerHTML="Guardar en SharePoint";
    document.getElementById("modal").insertAdjacentHTML("afterbegin",`<div class="alert-danger" style="margin-bottom:8px">Error: ${e.message}</div>`);
  }
}

function cerrarYBloquear(){
  document.getElementById("overlay").style.display="none";
  const cb=document.getElementById("btn-confirm");
  cb.disabled=true;cb.textContent="Horas confirmadas y guardadas ✓";
}

window.addEventListener("load",async()=>{try{await msalInstance.initialize();await msalInstance.handleRedirectPromise();}catch(e){}});
</script>
