let rc=50;
function esLaborable(d){return d.getDay()>=1&&d.getDay()<=5;}
function diasPendientes(reg){const hoy=new Date();hoy.setHours(0,0,0,0);const s=new Set(reg);const lista=[];for(let i=1;i<=30;i++){const d=new Date(hoy);d.setDate(hoy.getDate()-i);if(!esLaborable(d))continue;const k=d.toISOString().split("T")[0];if(s.has(k))break;lista.push(d);if(lista.length>=10)break;}return lista.reverse();}
function getTarifa(c,a){const ab=a||(currentUser?currentUser.nombreDespacho:"");if(c&&SPECIAL[c])return SPECIAL[c];return TARIFAS[ab]||450;}
function clienteFromEmail(addr){addr=(addr||"").toLowerCase();if(EMAIL_MAP[addr])return EMAIL_MAP[addr];const dom=addr.split("@")[1];if(!dom)return null;if(DOMAIN_MAP[dom])return DOMAIN_MAP[dom];return null;}
function clienteFromRecipients(recs){if(!recs||!recs.length)return null;for(const r of recs){const addr=((r.address||r)||"").toLowerCase();if(addr.includes("ugarterebolloabogados.com"))continue;const c=clienteFromEmail(addr);if(c&&c!=="Interno")return c;}return null;}
function limpiarAsunto(s){return(s||"").replace(/^(RE:|RV:|FW:|Re:|Fwd:|AW:)\s*/gi,"").trim();}
function estimarMinutos(preview,hasAttach){if(!preview)return 15;const w=preview.split(/\s+/).length;if(w>200)return 75;if(w>80)return 45;if(hasAttach)return 30;if(w>40)return 20;const corto=/^(ok|de acuerdo|perfecto|lo vemos|gracias|entendido|confirmado|recibido|vale)/i.test(preview.trim());return(corto&&w<15)?5:10;}
function cOpts(sel){const isManual=sel&&!TODOS.includes(sel)&&sel!=="— pendiente —";let h=`<optgroup label="── Prioritarios ──">`;CP.forEach(c=>{h+=`<option value="${c}"${sel===c?" selected":""}>${c}</option>`;});h+=`</optgroup><optgroup label="── Alfabéticos ──">`;CA.forEach(c=>{h+=`<option value="${c}"${sel===c?" selected":""}>${c}</option>`;});h+=`</optgroup><optgroup label="── Residuales ──">`;CR.forEach(c=>{h+=`<option value="${c}"${sel===c?" selected":""}>${c}</option>`;});h+=`</optgroup><optgroup label="── Otro ──"><option value="__manual__"${isManual?" selected":""}>✏️ Escribir cliente...</option></optgroup>`;return h;}
function tOpts(sel){return TAREAS.map(t=>`<option value="${t}"${sel===t?" selected":""}>${t}</option>`).join("");}
async function getToken(){if(!currentUser)throw new Error("No hay sesión activa");try{const r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account:currentUser});return r.accessToken;}catch(e){const r=await msalInstance.acquireTokenPopup({scopes:SCOPES,account:currentUser});return r.accessToken;}}
async function leerFechas(token,nombre){try{const r=await fetch(`https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${ITEM_ID}/workbook/tables/${TABLE_NAME}/rows`,{headers:{Authorization:`Bearer ${token}`}});if(!r.ok)return[];const d=await r.json();const f=new Set();for(const row of d.value||[]){const v=row.values[0];if((v[1]||"").toString().toLowerCase().includes(nombre.split(" ")[0].toLowerCase())){let raw=(v[0]||"").toString().trim();let k="";if(/^\d{2}\/\d{2}\/\d{4}$/.test(raw)){const p=raw.split("/");k=p[2]+"-"+p[1]+"-"+p[0];}else{k=raw.substring(0,10);}if(k)f.add(k);}}return[...f];}catch(e){return[];}}
function mostrarPendientes(dias){const sec=document.getElementById("pending-days-section");if(!dias||dias.length===0){sec.innerHTML="";return;}const MM=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];const chips=dias.map(d=>`<span class="day-chip">${d.getDate()} ${MM[d.getMonth()]}</span>`).join("");const msg=dias.length>=3?`<strong>Atención:</strong> llevas <strong>${dias.length} días laborables sin registrar</strong> horas.`:`Tienes <strong>${dias.length} día${dias.length>1?"s":""} laborable${dias.length>1?"s":""}</strong> sin registrar.`;sec.innerHTML=`<div class="pending-days"><h3>Días pendientes</h3><p>${msg}</p><div class="days-list">${chips}</div></div>`;}

async function arrancarApp(account){currentUser=account;const email=currentUser.username.toLowerCase();const nombre=EMAILS_ABOGADOS[email]||currentUser.name||currentUser.username;currentUser.nombreDespacho=nombre;document.getElementById("topbar-user").textContent=nombre;document.getElementById("login-screen").style.display="none";document.getElementById("loading-screen").style.display="flex";document.getElementById("loading-text").textContent="Comprobando días registrados...";const token=await getToken();const fechas=await leerFechas(token,nombre);const pendientes=diasPendientes(fechas);document.getElementById("loading-screen").style.display="none";document.getElementById("app-screen").style.display="block";const hoy=new Date();const DD=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];const MM2=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];document.getElementById("day-header").innerHTML=`<strong>${DD[hoy.getDay()]}, ${hoy.getDate()} de ${MM2[hoy.getMonth()]} de ${hoy.getFullYear()}</strong> · ${nombre} · ${getTarifa(null,nombre)} €/h`;mostrarPendientes(pendientes);render();}
async function cargarHoras(){const btn=document.getElementById("btn-cargar");btn.disabled=true;btn.textContent="⏳ Leyendo emails y calendario...";try{const token=await getToken();const fechaInput=document.getElementById("fecha-cargar").value;const hoy=new Date();const fechaBase=fechaInput?new Date(fechaInput+"T12:00:00"):hoy;const fechaISO=fechaBase.toISOString().split("T")[0];const ini=fechaISO+"T00:00:00Z";const fin=fechaISO+"T23:59:59Z";const[rE,rC]=await Promise.all([fetch(`https://graph.microsoft.com/v1.0/me/mailFolders/SentItems/messages?$filter=sentDateTime ge ${ini} and sentDateTime le ${fin}&$select=subject,toRecipients,ccRecipients,sentDateTime,bodyPreview,hasAttachments&$top=50&$orderby=sentDateTime asc`,{headers:{Authorization:`Bearer ${token}`}}),fetch(`https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=${ini}&endDateTime=${fin}&$select=subject,attendees,start,end,showAs,isCancelled`,{headers:{Authorization:`Bearer ${token}`}})]);const emails=(await rE.json()).value||[];const eventos=((await rC.json()).value||[]).filter(e=>!e.isCancelled&&e.showAs!=="free");dataBloques.forEach(b=>b.rows=[]);const hilos={};for(const em of emails){const asunto=limpiarAsunto(em.subject||"");if(/furia homes/i.test(asunto))continue;const dests=[...(em.toRecipients||[]).map(r=>r.emailAddress),...(em.ccRecipients||[]).map(r=>r.emailAddress)];const soloInterno=dests.every(r=>(r.address||"").includes("ugarterebolloabogados.com"));let cliente=soloInterno?"Interno":(clienteFromRecipients(dests)||"— pendiente —");const key=asunto+"|||"+cliente;if(!hilos[key])hilos[key]={asunto,cliente,emails:[],hasAttachment:false,dests:[]};hilos[key].emails.push(em);if(em.hasAttachments)hilos[key].hasAttachment=true;hilos[key].dests.push(...dests.map(r=>r.address||r));}for(const h of Object.values(hilos)){const n=h.emails.length;const last=h.emails[n-1];const mins=estimarMinutos(last.bodyPreview,h.hasAttachment);const destExt=h.dests.filter(d=>d&&!d.includes("ugarterebolloabogados.com")).slice(0,2).map(d=>{const parts=d.split("@");return parts[0].replace(/[._]/g," ");}).join(", ");const extracto=last.bodyPreview?(last.bodyPreview.substring(0,80).replace(/\r?\n/g," ").trim()+(last.bodyPreview.length>80?"...":"")):"";"";const desc=`${h.asunto} (${n} email${n>1?"s":""})${destExt?" → "+destExt:""}${extracto?" — "+extracto:""}`;const esIg=IGUALAS.has(h.cliente);const esInt=h.cliente==="Interno";const esPend=h.cliente==="— pendiente —";const bid=esIg?"b2":(esInt||esPend)?"b3":"b1";dataBloques.find(x=>x.bid===bid).rows.push({id:"e"+rc++,c:h.cliente,t:TAREAS[3],m:mins,d:desc,p:esPend,cal:false});}for(const ev of eventos){const asunto=ev.subject||"Reunión";if(/furia homes/i.test(asunto))continue;const ini_e=new Date(ev.start.dateTime||ev.start);const fin_e=new Date(ev.end.dateTime||ev.end);const dur=Math.round((fin_e-ini_e)/60000);const atts=(ev.attendees||[]).map(a=>a.emailAddress||a);const cliente=clienteFromRecipients(atts)||"— pendiente —";dataBloques.find(x=>x.bid==="b3").rows.push({id:"e"+rc++,c:cliente,t:TAREAS[2],m:dur,d:asunto+" — Teams/presencial",p:cliente==="— pendiente —",cal:true});}render();btn.textContent="📥 Cargar mis horas";btn.disabled=false;const total=dataBloques.flatMap(b=>b.rows).length;const alertas=[];if(total===0)alertas.push(`<div class="alert">No se encontraron emails. Añade filas manualmente.</div>`);if(fechaInput){const fechaObj=new Date(fechaInput+"T12:00:00");const DD=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];const MM=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];alertas.push(`<div class="alert">Cargando horas del <strong>${DD[fechaObj.getDay()]} ${fechaObj.getDate()} de ${MM[fechaObj.getMonth()]}</strong>. Recuerda que se guardarán con esa fecha.</div>`);}document.getElementById("top-alerts").innerHTML=alertas.join("");}catch(e){btn.disabled=false;btn.textContent="📥 Cargar mis horas";document.getElementById("top-alerts").innerHTML=`<div class="alert-danger">Error: ${e.message}</div>`;}}
function rowsHtml(bid,rows){return rows.map(r=>{const pc=r.p?"pending":"";const badge=r.p?`<span class="badge-p">pendiente</span>`:"";const calb=r.cal?`<span class="badge-cal">calendario</span>`:"";return `<tr class="row-main ${pc}" id="rm-${r.id}"><td><select onchange="onC('${bid}','${r.id}',this.value)">${cOpts(r.c)}</select>${badge}${calb}</td><td><select onchange="refresh()">${tOpts(r.t)}</select></td><td><input type="number" min="0" max="600" step="5" value="${r.m}" oninput="refresh()"></td><td></td><td><button class="del-btn" onclick="delRow('${bid}','${r.id}')">×</button></td></tr><tr class="row-desc ${pc}" id="rd-${r.id}"><td colspan="4" style="padding:0 8px 6px"><textarea class="desc-input" rows="2">${r.d}</textarea></td><td></td></tr>`;}).join("");}
function blockHtml(b){return `<div class="block"><div class="block-header"><span class="block-title" style="color:${b.color}">${b.label}</span><span class="block-mins" id="bm-${b.bid}"></span></div><table><colgroup><col class="tc"><col class="tt"><col class="tm"><col class="td"><col class="tx"></colgroup><thead><tr><th>Cliente</th><th>Tarea</th><th style="text-align:center">Min</th><th>Descripción</th><th></th></tr></thead><tbody id="tb-${b.bid}">${rowsHtml(b.bid,b.rows)}</tbody></table><button class="add-btn" onclick="addRow('${b.bid}')">+ Añadir fila</button></div>`;}
function render(){document.getElementById("blocks").innerHTML=dataBloques.map(blockHtml).join("");const p=dataBloques.flatMap(b=>b.rows).filter(r=>r.p).length;document.getElementById("top-alerts").innerHTML=p>0?`<div class="alert">${p} entrada${p>1?"s":""} marcadas como <strong>pendiente</strong> requieren asignación de cliente.</div>`:"";refresh();}
function getMins(bid){const tb=document.getElementById("tb-"+bid);if(!tb)return 0;return Array.from(tb.querySelectorAll("input[type=number]")).reduce((s,i)=>s+(parseInt(i.value)||0),0);}
function refresh(){dataBloques.forEach(b=>{const m=getMins(b.bid);const el=document.getElementById("bm-"+b.bid);if(el)el.innerHTML=`<b>${Math.floor(m/60)}h ${m%60}min</b>`;});const map={};dataBloques.forEach(b=>{const tb=document.getElementById("tb-"+b.bid);if(!tb)return;Array.from(tb.querySelectorAll("tr.row-main")).forEach(tr=>{const c=tr.querySelector("select").value;const m=parseInt(tr.querySelector("input[type=number]").value)||0;map[c]=(map[c]||0)+m;});});const total=Object.values(map).reduce((s,v)=>s+v,0);let html=Object.entries(map).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([c,m])=>`<div class="sum-row"><span>${c}</span><span>${Math.floor(m/60)}h ${m%60}min</span></div>`).join("");html+=`<div class="sum-row"><span>Total</span><span>${Math.floor(total/60)}h ${total%60}min</span></div>`;document.getElementById("sum-rows").innerHTML=html;}
function onC(bid,rid,val){const b=dataBloques.find(x=>x.bid===bid);if(!b)return;const r=b.rows.find(x=>x.id===rid);if(!r)return;if(val==="__manual__"){const nombre=prompt("Nombre del cliente:");if(nombre&&nombre.trim()){val=nombre.trim();}else{const sel=document.querySelector(`#rm-${rid} select`);if(sel)sel.value=r.c;return;}}r.c=val;r.p=(val==="— pendiente —");["rm-","rd-"].forEach(p=>{const el=document.getElementById(p+rid);if(!el)return;el.className=el.className.replace(/\bpending\b/g,"").trim()+(r.p?" pending":"");});const sel=document.querySelector(`#rm-${rid} select`);if(sel){const exists=[...sel.options].some(o=>o.value===val);if(!exists){const opt=document.createElement("option");opt.value=val;opt.text=val;opt.selected=true;sel.insertBefore(opt,sel.firstChild);}}const badge=document.getElementById("rm-"+rid)?.querySelector(".badge-p");if(badge)badge.style.display=r.p?"":"none";refresh();}
function delRow(bid,rid){const b=dataBloques.find(x=>x.bid===bid);if(!b)return;b.rows=b.rows.filter(x=>x.id!==rid);["rm-","rd-"].forEach(p=>{const el=document.getElementById(p+rid);if(el)el.remove();});refresh();}
function addRow(bid){const b=dataBloques.find(x=>x.bid===bid);if(!b)return;const id="e"+rc++;const nr={id,c:"— pendiente —",t:TAREAS[3],m:0,d:"",p:true,cal:false};b.rows.push(nr);const tb=document.getElementById("tb-"+bid);const tmp=document.createElement("tbody");tmp.innerHTML=rowsHtml(bid,[nr]);Array.from(tmp.children).forEach(tr=>tb.appendChild(tr));refresh();}
function getRows(){const rows=[];dataBloques.forEach(b=>{const tb=document.getElementById("tb-"+b.bid);if(!tb)return;Array.from(tb.querySelectorAll("tr.row-main")).forEach(tr=>{const sels=tr.querySelectorAll("select");const inp=tr.querySelector("input[type=number]");const rdesc=tr.nextElementSibling;const desc=rdesc?rdesc.querySelector("textarea")?.value||"":"";rows.push({cliente:sels[0].value,tarea:sels[1].value,minutos:parseInt(inp.value)||0,descripcion:desc});});});return rows;}
function abrirResumen(){const rows=getRows();const sinMin=rows.filter(r=>r.minutos===0);const sinC=rows.filter(r=>r.cliente==="— pendiente —"&&r.minutos>0);const fact=rows.filter(r=>r.minutos>0&&r.cliente!=="Interno"&&r.cliente!=="— pendiente —"&&!IGUALAS.has(r.cliente));const ig=rows.filter(r=>r.minutos>0&&IGUALAS.has(r.cliente));const otros=rows.filter(r=>r.minutos>0&&r.cliente==="Interno");function grp(arr){const m={};arr.forEach(r=>{m[r.cliente]=(m[r.cliente]||0)+r.minutos;});return m;}const fg=grp(fact),ig2=grp(ig),og=grp(otros);const ab=currentUser?currentUser.nombreDespacho:"—";let ftotal=0;let fhtml=Object.entries(fg).map(([c,m])=>{const t=getTarifa(c,ab),imp=(m/60)*t;ftotal+=imp;return `<tr><td>${c}</td><td style="text-align:right">${Math.floor(m/60)}h ${m%60}min</td><td style="text-align:right;color:#888">${t}€/h</td><td style="text-align:right;font-weight:500">${Math.round(imp).toLocaleString("es-ES")}€</td></tr>`;}).join("");if(fhtml)fhtml+=`<tr class="total-row"><td colspan="3">Total facturable</td><td style="text-align:right">${Math.round(ftotal).toLocaleString("es-ES")}€</td></tr>`;const ihtml=Object.entries(ig2).map(([c,m])=>{const t=getTarifa(null,ab),imp=(m/60)*t;return `<tr><td>${c}</td><td style="text-align:right">${Math.floor(m/60)}h ${m%60}min</td><td style="text-align:right;font-weight:500">${Math.round(imp).toLocaleString("es-ES")}€</td></tr>`;}).join("");const ohtml=Object.entries(og).map(([c,m])=>`<tr><td>${c}</td><td style="text-align:right">${Math.floor(m/60)}h ${m%60}min</td></tr>`).join("");let warns="";if(sinMin.length)warns+=`<div class="alert">${sinMin.length} entrada${sinMin.length>1?"s":""} con 0 minutos.</div>`;if(sinC.length)warns+=`<div class="alert">${sinC.length} entrada${sinC.length>1?"s":""} sin cliente.</div>`;const fechaMostrar=new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long",year:"numeric"});document.getElementById("modal").innerHTML=`${warns}<h2>Resumen — ${fechaMostrar}</h2><div class="msec-title">Honorarios facturables</div><table>${fhtml||"<tr><td style='color:#888'>Sin entradas facturables</td></tr>"}</table>${ihtml?`<div class="msec-title">Valor interno igualas</div><table>${ihtml}</table>`:""}${ohtml?`<div class="msec-title">Otros</div><table>${ohtml}</table>`:""}<div class="impact">Hoy has generado <strong>${Math.round(ftotal).toLocaleString("es-ES")} €</strong> en honorarios facturables. Cada hora no registrada representa <strong>${getTarifa(null,ab)} €</strong> que el despacho no puede facturar.</div><button class="modal-btn" id="btn-sp" onclick="guardarEnSharePoint()">Guardar en SharePoint</button><button class="modal-btn-sec" onclick="document.getElementById('overlay').style.display='none'">Cerrar sin guardar</button>`;document.getElementById("overlay").style.display="flex";}
async function guardarEnSharePoint(){const btn=document.getElementById("btn-sp");btn.disabled=true;btn.innerHTML=`<span class="spinner"></span>Guardando...`;try{const token=await getToken();const rows=getRows().filter(r=>r.minutos>0&&r.cliente!=="— pendiente —");const fechaInput=document.getElementById("fecha-cargar").value;const fecha=fechaInput||new Date().toISOString().split("T")[0];const ab=currentUser.nombreDespacho;let ok=0,fail=0;for(const r of rows){const t=getTarifa(r.cliente,ab);const imp=Math.round((r.minutos/60)*t*100)/100;const iguala=IGUALAS.has(r.cliente)?"Sí":"No";const body={values:[[fecha,ab,r.cliente,r.tarea,r.descripcion,r.minutos,t,imp,iguala,"No",""]]};const resp=await fetch(`https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${ITEM_ID}/workbook/tables/${TABLE_NAME}/rows`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body)});if(resp.ok)ok++;else{fail++;console.error(await resp.json());}}if(fail===0){document.getElementById("modal").innerHTML=`<div class="alert-success"><strong>${ok} fila${ok>1?"s":""} guardada${ok>1?"s":""} en SharePoint.</strong><br><span style="font-size:11px;margin-top:4px;display:block">UR_Registro_Horas_v2_2.xlsx · ${fecha}</span></div><button class="modal-btn-sec" onclick="cerrarYBloquear()">Cerrar</button>`;}else{document.getElementById("modal").innerHTML=`<div class="alert-danger">${ok} filas guardadas, ${fail} con error.</div><button class="modal-btn-sec" onclick="document.getElementById('overlay').style.display='none'">Cerrar</button>`;}}catch(e){btn.disabled=false;btn.innerHTML="Guardar en SharePoint";document.getElementById("modal").insertAdjacentHTML("afterbegin",`<div class="alert-danger" style="margin-bottom:8px">Error: ${e.message}</div>`);}}
function cerrarYBloquear(){document.getElementById("overlay").style.display="none";const cb=document.getElementById("btn-confirm");cb.disabled=true;cb.textContent="Horas confirmadas y guardadas ✓";dataBloques.forEach(b=>b.rows=[]);render();}
window.addEventListener("load",async()=>{try{await msalInstance.initialize();await msalInstance.handleRedirectPromise();const accounts=msalInstance.getAllAccounts();if(accounts.length>0){await arrancarApp(accounts[0]);}}catch(e){console.error(e);}});
</script>
